logging:
  level: INFO
  handlers:
    jsonl: INFO
    logs_db: DEBUG
    errors_db: ERROR
  retention:
    logs_db_days: 7
    errors_db_days: 30
    jsonl_max_bytes: 52428800
    jsonl_backup_count: 5
llm:
  backend_type: openai
  base_url: https://api.fuelix.ai/v1
  model: claude-sonnet-4-6
  context_window: 200000
  temperature: 0.2
  max_tokens: 16384
  top_p: 0.95
  thinking_budget: 3500
  subagents:
    code-reviewer:
      model: gpt-5.4-2026-03-05
    doc-writer:
      model: gpt-5.4-2026-03-05
    explore:
      model: claude-haiku-4-5-20251001
limits:
  iteration_limit_enabled: true
  max_iterations: 50
auto_approve:
  read: true
  edit: false
  execute: false
  browser: false
  knowledge_update: false
  subagent: false
prompt_enrichment:
  model: gpt-4.1-mini-canada
  system_prompt: ''
trace_enabled: false
