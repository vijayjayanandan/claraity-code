version: 2
updates:
  # Python dependencies
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"

  # VS Code extension (npm)
  - package-ecosystem: "npm"
    directory: "/claraity-vscode"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "npm"
    groups:
      npm-dev:
        dependency-type: "development"
      npm-prod:
        dependency-type: "production"

  # Webview UI (npm)
  - package-ecosystem: "npm"
    directory: "/claraity-vscode/webview-ui"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "npm"
    groups:
      webview-dev:
        dependency-type: "development"
      webview-prod:
        dependency-type: "production"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
