<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClarAIty - Architecture</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  :root {
    --bg: #0d1117; --surface: #161b22; --border: #30363d;
    --text: #e6edf3; --text-muted: #8b949e; --accent: #58a6ff;
    --green: #3fb950; --orange: #d29922; --red: #f85149;
    --purple: #bc8cff; --pink: #f778ba; --cyan: #79c0ff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); overflow: hidden; height: 100vh; }

  #app { display: grid; grid-template-columns: 1fr 360px; grid-template-rows: auto 1fr; height: 100vh; }

  #header { grid-column: 1 / -1; background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 20px; display: flex; align-items: center; gap: 16px; }
  #header h1 { font-size: 16px; font-weight: 600; color: var(--accent); }
  #header .stats { font-size: 12px; color: var(--text-muted); }
  .controls { display: flex; gap: 8px; margin-left: auto; align-items: center; }
  .btn { background: var(--surface); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 4px 12px; font-size: 12px; cursor: pointer; }
  .btn:hover { border-color: var(--accent); }
  .btn-link { background: none; border: none; color: var(--accent); font-size: 12px; cursor: pointer; text-decoration: underline; }

  #graph-container { position: relative; overflow: hidden; }
  svg { width: 100%; height: 100%; }

  /* Module groups */
  .module-box { cursor: grab; }
  .module-box.dragging { cursor: grabbing; }
  .module-box rect.module-bg { rx: 8; ry: 8; stroke-width: 1.5px; transition: stroke-width 0.15s; }
  .module-box:hover rect.module-bg { stroke-width: 2.5px; }
  .module-box .module-label { font-size: 12px; font-weight: 600; fill: var(--accent); pointer-events: none; }
  .module-box .module-count { font-size: 10px; fill: var(--text-muted); pointer-events: none; }
  .module-box .expand-icon { font-size: 11px; fill: var(--text-muted); pointer-events: none; }

  /* Component nodes */
  .comp-node { cursor: pointer; }
  .comp-node rect { rx: 4; ry: 4; stroke-width: 1.5px; transition: stroke-width 0.15s; }
  .comp-node:hover rect { stroke-width: 2.5px; }
  .comp-node.selected rect { stroke: #fff !important; stroke-width: 2.5px; }
  .comp-node text { font-size: 10px; fill: var(--text); pointer-events: none; }
  .comp-node .comp-lines { font-size: 9px; fill: var(--text-muted); }

  /* Edges — static by default, animate only on highlight */
  .edge-path { fill: none; stroke-width: 1.3; stroke-opacity: 0.2; stroke-dasharray: 6 4; }
  .edge-path.highlighted { stroke-opacity: 0.9; stroke-width: 2.2; stroke-dasharray: 8 4; animation: dash-flow 0.7s linear infinite; }
  .edge-path.dimmed { stroke-opacity: 0.06; }
  @keyframes dash-flow { to { stroke-dashoffset: -20; } }
  .edge-label { font-size: 8px; fill: var(--text-muted); pointer-events: none; opacity: 0; transition: opacity 0.15s; }
  .edge-label.highlighted { opacity: 1; }
  marker path { stroke: none; }

  /* System nodes */
  .system-node { cursor: grab; }
  .system-node rect { rx: 16; ry: 16; }
  .system-node text { font-size: 10px; fill: var(--red); pointer-events: none; }

  /* Detail panel */
  #detail-panel { background: var(--surface); border-left: 1px solid var(--border); padding: 16px; overflow-y: auto; }
  #detail-panel h2 { font-size: 15px; font-weight: 600; margin-bottom: 4px; color: var(--accent); }
  #detail-panel .node-type { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 12px; }
  #detail-panel .section { margin-bottom: 16px; }
  #detail-panel .section h3 { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; border-bottom: 1px solid var(--border); padding-bottom: 4px; }
  #detail-panel p, #detail-panel li { font-size: 13px; line-height: 1.5; }
  #detail-panel ul { list-style: none; padding: 0; }
  #detail-panel .tag { display: inline-block; background: var(--bg); border: 1px solid var(--border); border-radius: 12px; padding: 2px 8px; font-size: 11px; margin: 2px; color: var(--text-muted); }
  .file-path { font-family: 'SFMono-Regular', Consolas, monospace; font-size: 12px; color: var(--cyan); }
  .risk-badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; }
  .risk-high { background: rgba(248,81,73,.2); color: var(--red); }
  .risk-medium { background: rgba(210,153,34,.2); color: var(--orange); }
  .risk-low { background: rgba(63,185,80,.2); color: var(--green); }
  .edge-item { padding: 3px 0; font-size: 12px; display: flex; align-items: center; gap: 6px; }
  .edge-item .arrow { color: var(--text-muted); font-size: 10px; }
  .edge-item .edge-type { color: var(--text-muted); font-size: 10px; }
  .edge-item .edge-target { color: var(--accent); cursor: pointer; }
  .edge-item .edge-target:hover { text-decoration: underline; }
  .placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text-muted); font-size: 14px; text-align: center; gap: 8px; }

  #tooltip { position: absolute; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; font-size: 12px; pointer-events: none; opacity: 0; transition: opacity 0.15s; max-width: 300px; z-index: 100; }
  #tooltip.visible { opacity: 1; }
  #tooltip .tt-name { font-weight: 600; color: var(--accent); }
  #tooltip .tt-desc { color: var(--text-muted); margin-top: 2px; }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <h1>ClarAIty Architecture</h1>
    <span class="stats" id="stats-text"></span>
    <div class="controls">
      <button class="btn" id="btn-expand-all">Expand All</button>
      <button class="btn" id="btn-collapse-all">Collapse All</button>
      <button class="btn" id="btn-reset">Reset Zoom</button>
      <a href="index.html" class="btn-link">Force Graph</a>
    </div>
  </div>
  <div id="graph-container">
    <svg id="graph"></svg>
    <div id="tooltip"></div>
  </div>
  <div id="detail-panel">
    <div class="placeholder">
      <div style="font-size:24px;opacity:.3;">&#9678;</div>
      <div>Click a module to expand/collapse</div>
      <div style="font-size:12px;opacity:.6">Drag modules to rearrange</div>
    </div>
  </div>
</div>
<script>
// =========================================================================
// Config
// =========================================================================
const MODULE_COLORS = {
  'mod-core': '#58a6ff', 'mod-memory': '#3fb950', 'mod-session': '#3fb950',
  'mod-ui': '#bc8cff', 'mod-tools': '#79c0ff', 'mod-llm': '#d29922',
  'mod-server': '#f778ba', 'mod-observability': '#8b949e', 'mod-prompts': '#8b949e',
  'mod-subagents': '#79c0ff', 'mod-director': '#f778ba', 'mod-code-intel': '#8b949e',
  'mod-integrations': '#8b949e', 'mod-platform': '#8b949e', 'mod-hooks': '#8b949e',
};
const EDGE_COLORS = {
  uses: '#58a6ff', calls: '#3fb950', writes: '#f85149', reads: '#79c0ff',
  spawns: '#bc8cff', drives: '#f778ba', renders: '#3fb950', dispatches: '#79c0ff',
  controls: '#d29922', configures: '#d29922', bridges: '#f778ba', wraps: '#8b949e',
  interacts: '#f778ba', communicates: '#f778ba', connects: '#8b949e',
  fetches: '#79c0ff', queries: '#79c0ff', reads_writes: '#d29922',
};
const RISK_COLORS = { high: '#f85149', medium: '#d29922', low: '#3fb950' };
const COMP_W = 155, COMP_H = 40, COMP_PAD = 12, MOD_PAD_TOP = 36, MOD_PAD = 16;
const COLLAPSED_W = 180, COLLAPSED_H = 50;
const ROW_GAP = 36, COL_GAP = 28;

// =========================================================================
// State
// =========================================================================
let graphData = null;
let expandedModules = new Set();
let selectedNode = null;
let zoomBehavior = null;

// Dragged positions: nodeId -> {x, y} — persists across re-renders
const dragPositions = {};

// =========================================================================
// Init
// =========================================================================
async function init() {
  const resp = await fetch('./graph.json');
  graphData = await resp.json();
  document.getElementById('stats-text').textContent =
    `${graphData.stats.total_nodes} nodes | ${graphData.stats.total_edges} edges`;
  expandedModules.add('mod-core');
  expandedModules.add('mod-memory');
  render();
}

// =========================================================================
// Layout: positions from DB flow_rank/flow_col, overridden by drag
// =========================================================================
function calculateLayout(data) {
  const nodeMap = {};
  data.nodes.forEach(n => nodeMap[n.id] = n);

  const modules = data.nodes.filter(n => n.type === 'module');
  const systems = data.nodes.filter(n => n.type === 'system');
  const containsEdges = data.edges.filter(e => e.type === 'contains');
  const moduleChildren = {}, childToModule = {};
  containsEdges.forEach(e => {
    if (!moduleChildren[e.from_id]) moduleChildren[e.from_id] = [];
    moduleChildren[e.from_id].push(e.to_id);
    childToModule[e.to_id] = e.from_id;
  });

  // Build module layouts with sizes
  const moduleLayouts = [];
  modules.forEach(mod => {
    const children = (moduleChildren[mod.id] || []).map(cid => nodeMap[cid]).filter(Boolean);
    if (children.length === 0) return;
    const expanded = expandedModules.has(mod.id);
    const label = mod.name.replace('src/', '').replace(/\/$/, '');
    const props = typeof mod.properties === 'string' ? JSON.parse(mod.properties) : (mod.properties || {});

    if (expanded) {
      // 2 columns for readability, more space to see flow
      const cols = Math.min(children.length, 2);
      const rows = Math.ceil(children.length / cols);
      const w = cols * (COMP_W + COMP_PAD) + MOD_PAD * 2 - COMP_PAD;
      const h = rows * (COMP_H + COMP_PAD) + MOD_PAD_TOP + MOD_PAD - COMP_PAD;
      const childLayouts = children.map((c, i) => ({
        id: c.id, node: c,
        relX: MOD_PAD + (i % cols) * (COMP_W + COMP_PAD),
        relY: MOD_PAD_TOP + Math.floor(i / cols) * (COMP_H + COMP_PAD),
        w: COMP_W, h: COMP_H,
      }));
      moduleLayouts.push({ id: mod.id, node: mod, label, expanded: true, w, h, children: childLayouts, color: MODULE_COLORS[mod.id] || '#8b949e', flow_rank: props.flow_rank ?? 99, flow_col: props.flow_col ?? 0 });
    } else {
      moduleLayouts.push({ id: mod.id, node: mod, label, expanded: false, w: COLLAPSED_W, h: COLLAPSED_H, children: [], count: children.length, color: MODULE_COLORS[mod.id] || '#8b949e', flow_rank: props.flow_rank ?? 99, flow_col: props.flow_col ?? 0 });
    }
  });

  // --- Position by flow_rank (row) and flow_col (column within row) ---
  // Group by flow_rank
  const rows = {};
  moduleLayouts.forEach(ml => {
    const r = ml.flow_rank;
    if (!rows[r]) rows[r] = [];
    rows[r].push(ml);
  });

  // Sort rows, then sort items within each row by flow_col
  const sortedRanks = Object.keys(rows).map(Number).sort((a, b) => a - b);

  let cy = 80; // start below system row
  sortedRanks.forEach(rank => {
    const row = rows[rank].sort((a, b) => a.flow_col - b.flow_col);
    const totalW = row.reduce((s, ml) => s + ml.w, 0) + (row.length - 1) * COL_GAP;
    let cx = Math.max(40, (1100 - totalW) / 2);
    let maxH = 0;

    row.forEach(ml => {
      // Use dragged position if available, otherwise calculated
      if (dragPositions[ml.id]) {
        ml.x = dragPositions[ml.id].x;
        ml.y = dragPositions[ml.id].y;
      } else {
        ml.x = cx;
        ml.y = cy;
      }
      cx += ml.w + COL_GAP;
      maxH = Math.max(maxH, ml.h);

      ml.children.forEach(cl => {
        cl.x = ml.x + cl.relX;
        cl.y = ml.y + cl.relY;
      });
    });

    cy += maxH + ROW_GAP;
  });

  // System nodes: position by flow_col from DB
  const sysSorted = systems.slice().sort((a, b) => {
    const pa = typeof a.properties === 'string' ? JSON.parse(a.properties) : (a.properties || {});
    const pb = typeof b.properties === 'string' ? JSON.parse(b.properties) : (b.properties || {});
    return (pa.flow_col ?? 99) - (pb.flow_col ?? 99);
  });
  const totalSysW = sysSorted.length * 140 + (sysSorted.length - 1) * 20;
  const sysStartX = Math.max(40, (1100 - totalSysW) / 2);
  const sysLayouts = sysSorted.map((s, i) => {
    const id = s.id;
    const pos = dragPositions[id];
    return {
      id, node: s,
      x: pos ? pos.x : sysStartX + i * 160,
      y: pos ? pos.y : 10,
      w: 140, h: 34,
    };
  });

  // Position map for edges
  const posMap = {};
  sysLayouts.forEach(s => { posMap[s.id] = { x: s.x + s.w/2, y: s.y + s.h/2, w: s.w, h: s.h }; });
  moduleLayouts.forEach(ml => {
    posMap[ml.id] = { x: ml.x + ml.w/2, y: ml.y + ml.h/2, w: ml.w, h: ml.h };
    ml.children.forEach(cl => { posMap[cl.id] = { x: cl.x + cl.w/2, y: cl.y + cl.h/2, w: cl.w, h: cl.h }; });
  });

  // Build visible edges with dedup
  function visibleId(id) {
    const pm = childToModule[id];
    return (pm && !expandedModules.has(pm)) ? pm : id;
  }
  const EDGE_PRIORITY = { writes: 5, calls: 4, drives: 4, spawns: 3, uses: 2, reads: 2 };
  const edgeMap = new Map();
  data.edges.filter(e => e.type !== 'contains' && e.type !== 'constrains').forEach(e => {
    const fv = nodeMap[e.from_id]?.type === 'component' ? visibleId(e.from_id) : e.from_id;
    const tv = nodeMap[e.to_id]?.type === 'component' ? visibleId(e.to_id) : e.to_id;
    if (fv === tv || !posMap[fv] || !posMap[tv]) return;
    const key = `${fv}:${tv}`;
    const pri = EDGE_PRIORITY[e.type] || 1;
    const ex = edgeMap.get(key);
    if (!ex || pri > (EDGE_PRIORITY[ex.type] || 1)) {
      edgeMap.set(key, { from: fv, to: tv, type: e.type, label: e.label, fromPos: posMap[fv], toPos: posMap[tv] });
    }
  });

  return { moduleLayouts, sysLayouts, visibleEdges: Array.from(edgeMap.values()), posMap, nodeMap, childToModule };
}

// =========================================================================
// Curved edge path
// =========================================================================
function curvedPath(from, to) {
  const dx = to.x - from.x, dy = to.y - from.y;
  const dist = Math.sqrt(dx*dx + dy*dy);
  if (dist === 0) return `M${from.x},${from.y}L${to.x},${to.y}`;

  // Clip at box borders
  const ux = dx/dist, uy = dy/dist;
  const ft = Math.min(ux ? Math.abs(from.w/2/ux) : 1e9, uy ? Math.abs(from.h/2/uy) : 1e9);
  const tt = Math.min(ux ? Math.abs(to.w/2/ux) : 1e9, uy ? Math.abs(to.h/2/uy) : 1e9);
  const x1 = from.x + ux*ft, y1 = from.y + uy*ft;
  const x2 = to.x - ux*(tt+8), y2 = to.y - uy*(tt+8);

  // Bezier control point: offset perpendicular to the line
  const midX = (x1+x2)/2, midY = (y1+y2)/2;
  // Curvature proportional to distance, perpendicular offset
  const curv = Math.min(dist * 0.2, 60);
  const cx1 = midX - uy*curv, cy1 = midY + ux*curv;

  return `M${x1},${y1} Q${cx1},${cy1} ${x2},${y2}`;
}

// =========================================================================
// Render
// =========================================================================
function render() {
  const container = document.getElementById('graph-container');
  const svg = d3.select('#graph');
  svg.selectAll('*').remove();

  const layout = calculateLayout(graphData);

  // Arrow markers
  const defs = svg.append('defs');
  const allEdgeTypes = {...EDGE_COLORS, default: '#8b949e'};
  Object.entries(allEdgeTypes).forEach(([type, color]) => {
    defs.append('marker').attr('id', `arr-${type}`)
      .attr('viewBox', '0 -4 8 8').attr('refX', 8).attr('refY', 0)
      .attr('markerWidth', 6).attr('markerHeight', 6).attr('orient', 'auto')
      .append('path').attr('d', 'M0,-4L8,0L0,4Z').attr('fill', color);
  });

  // Zoom
  const g = svg.append('g');
  if (!zoomBehavior) {
    zoomBehavior = d3.zoom().scaleExtent([0.15, 3])
      .on('zoom', e => g.attr('transform', e.transform));
  }
  svg.call(zoomBehavior);

  document.getElementById('btn-reset').onclick = () =>
    svg.transition().duration(400).call(zoomBehavior.transform, d3.zoomIdentity);

  // Click background to deselect
  svg.on('click', () => {
    selectedNode = null;
    clearHighlight();
    d3.selectAll('.comp-node').classed('selected', false);
    document.getElementById('detail-panel').innerHTML = '<div class="placeholder"><div style="font-size:24px;opacity:.3;">&#9678;</div><div>Click a module to expand/collapse</div><div style="font-size:12px;opacity:.6">Drag modules to rearrange</div></div>';
  });

  // ---- Edges (curved, animated) ----
  const edgeGroup = g.append('g');
  const edgeEls = [];

  layout.visibleEdges.forEach(e => {
    const color = EDGE_COLORS[e.type] || '#8b949e';
    const mid = EDGE_COLORS[e.type] ? `arr-${e.type}` : 'arr-default';
    const eg = edgeGroup.append('g');

    const path = eg.append('path')
      .attr('class', 'edge-path')
      .attr('d', curvedPath(e.fromPos, e.toPos))
      .attr('stroke', color)
      .attr('marker-end', `url(#${mid})`)
      .datum(e);

    let labelEl = null;
    if (e.label) {
      const mp = midpoint(e.fromPos, e.toPos);
      labelEl = eg.append('text').attr('class', 'edge-label')
        .attr('x', mp.x).attr('y', mp.y - 4).attr('text-anchor', 'middle')
        .text(e.label.length > 22 ? e.label.substring(0, 20) + '..' : e.label)
        .datum(e);
    }
    edgeEls.push({ g: eg, path, labelEl, data: e });
  });

  // Redraw all edges (called after drag)
  function redrawEdges() {
    const newLayout = calculateLayout(graphData);
    edgeEls.forEach(el => {
      const ne = newLayout.visibleEdges.find(ve => ve.from === el.data.from && ve.to === el.data.to);
      if (ne) {
        el.path.attr('d', curvedPath(ne.fromPos, ne.toPos));
        if (el.labelEl) {
          const mp = midpoint(ne.fromPos, ne.toPos);
          el.labelEl.attr('x', mp.x).attr('y', mp.y - 4);
        }
      }
    });
  }

  // ---- System nodes (draggable) ----
  layout.sysLayouts.forEach(s => {
    const sg = g.append('g').attr('class', 'system-node')
      .attr('transform', `translate(${s.x},${s.y})`);
    sg.append('rect').attr('width', s.w).attr('height', s.h)
      .attr('fill', 'rgba(248,81,73,0.08)').attr('stroke', '#f85149').attr('stroke-width', 1);
    sg.append('text').attr('x', s.w/2).attr('y', s.h/2+1)
      .attr('text-anchor', 'middle').attr('dominant-baseline', 'central')
      .text(s.node.name.length > 18 ? s.node.name.substring(0,16)+'..' : s.node.name);

    sg.on('mouseover', ev => showTooltip(ev, s.node))
      .on('mousemove', moveTooltip).on('mouseout', hideTooltip);

    // Drag system nodes
    sg.call(d3.drag()
      .on('start', function() { d3.select(this).raise(); })
      .on('drag', function(event) {
        const nx = (dragPositions[s.id]?.x ?? s.x) + event.dx;
        const ny = (dragPositions[s.id]?.y ?? s.y) + event.dy;
        dragPositions[s.id] = { x: nx, y: ny };
        d3.select(this).attr('transform', `translate(${nx},${ny})`);
        // Update posMap for edges
        layout.posMap[s.id] = { x: nx + s.w/2, y: ny + s.h/2, w: s.w, h: s.h };
        redrawEdges();
      })
    );
  });

  // ---- Module groups (draggable) ----
  layout.moduleLayouts.forEach(ml => {
    const mg = g.append('g').attr('class', 'module-box')
      .attr('transform', `translate(${ml.x},${ml.y})`);

    mg.append('rect').attr('class', 'module-bg')
      .attr('width', ml.w).attr('height', ml.h)
      .attr('fill', hexToRgba(ml.color, 0.06))
      .attr('stroke', ml.color)
      .attr('stroke-dasharray', ml.expanded ? 'none' : '4,3');

    mg.append('text').attr('class', 'module-label')
      .attr('x', MOD_PAD).attr('y', ml.expanded ? 22 : ml.h/2-6).text(ml.label);

    // Clickable expand/collapse button
    const btnG = mg.append('g').attr('class', 'expand-btn').style('cursor', 'pointer');
    if (ml.expanded) {
      btnG.append('rect').attr('x', ml.w - 38).attr('y', 6).attr('width', 28).attr('height', 20)
        .attr('rx', 4).attr('fill', 'rgba(255,255,255,0.06)').attr('stroke', 'rgba(255,255,255,0.15)');
      btnG.append('text').attr('x', ml.w - 24).attr('y', 20).attr('text-anchor', 'middle')
        .attr('font-size', '11px').attr('fill', 'var(--text-muted)').text('[-]');
    } else {
      mg.append('text').attr('class', 'module-count')
        .attr('x', MOD_PAD).attr('y', ml.h/2+10).text(`${ml.count} components`);
      btnG.append('rect').attr('x', ml.w - 38).attr('y', ml.h/2 - 10).attr('width', 28).attr('height', 20)
        .attr('rx', 4).attr('fill', 'rgba(255,255,255,0.06)').attr('stroke', 'rgba(255,255,255,0.15)');
      btnG.append('text').attr('x', ml.w - 24).attr('y', ml.h/2 + 4).attr('text-anchor', 'middle')
        .attr('font-size', '11px').attr('fill', 'var(--text-muted)').text('[+]');
    }

    btnG.on('click', (ev) => {
      ev.stopPropagation();
      if (expandedModules.has(ml.id)) expandedModules.delete(ml.id);
      else expandedModules.add(ml.id);
      // Clear drag position so it re-layouts cleanly
      delete dragPositions[ml.id];
      render();
    });

    mg.on('mouseover', ev => { showTooltip(ev, ml.node); highlightEdges(ml.id); })
      .on('mousemove', moveTooltip)
      .on('mouseout', () => { hideTooltip(); if (!selectedNode) clearHighlight(); })
      .on('click', (ev) => {
        // Click module body (not expand btn) to show details and highlight
        selectedNode = ml.id;
        highlightEdges(ml.id);
        showDetail(ml.node, graphData, calculateLayout(graphData));
      });

    // Component groups inside (stored as children of mg for dragging)
    const compGroups = [];
    ml.children.forEach(cl => {
      const rc = RISK_COLORS[cl.node.risk_level] || RISK_COLORS.low;
      const isHigh = cl.node.risk_level === 'high';
      const cg = g.append('g').attr('class', 'comp-node')
        .attr('transform', `translate(${cl.x},${cl.y})`).datum(cl.node);

      cg.append('rect').attr('width', cl.w).attr('height', cl.h)
        .attr('fill', hexToRgba(rc, 0.08)).attr('stroke', rc).attr('stroke-width', isHigh ? 2 : 1);
      const nm = cl.node.name.length > 17 ? cl.node.name.substring(0,15)+'..' : cl.node.name;
      cg.append('text').attr('x', cl.w/2).attr('y', cl.h/2-3).attr('text-anchor', 'middle').text(nm);
      if (cl.node.line_count) cg.append('text').attr('class', 'comp-lines')
        .attr('x', cl.w/2).attr('y', cl.h/2+10).attr('text-anchor', 'middle').text(`${cl.node.line_count} lines`);

      cg.on('click', ev => {
        ev.stopPropagation();
        selectedNode = cl.node.id;
        d3.selectAll('.comp-node').classed('selected', function() { return d3.select(this).datum()?.id === selectedNode; });
        showDetail(cl.node, graphData, layout);
        highlightEdges(cl.node.id);
      })
      .on('mouseover', ev => { showTooltip(ev, cl.node); highlightEdges(cl.node.id); })
      .on('mousemove', moveTooltip)
      .on('mouseout', () => { hideTooltip(); if (!selectedNode) clearHighlight(); });

      compGroups.push({ el: cg, relX: cl.relX, relY: cl.relY });
    });

    // Drag module (children follow)
    mg.call(d3.drag()
      .on('start', function() {
        d3.select(this).raise().classed('dragging', true);
        compGroups.forEach(c => c.el.raise());
      })
      .on('drag', function(event) {
        const nx = (dragPositions[ml.id]?.x ?? ml.x) + event.dx;
        const ny = (dragPositions[ml.id]?.y ?? ml.y) + event.dy;
        dragPositions[ml.id] = { x: nx, y: ny };
        d3.select(this).attr('transform', `translate(${nx},${ny})`);

        // Move children
        compGroups.forEach(c => {
          c.el.attr('transform', `translate(${nx + c.relX},${ny + c.relY})`);
        });

        // Update posMap
        layout.posMap[ml.id] = { x: nx + ml.w/2, y: ny + ml.h/2, w: ml.w, h: ml.h };
        ml.children.forEach((cl, i) => {
          layout.posMap[cl.id] = { x: nx + compGroups[i].relX + cl.w/2, y: ny + compGroups[i].relY + cl.h/2, w: cl.w, h: cl.h };
        });

        // Redraw edges live
        edgeEls.forEach(el => {
          const fp = layout.posMap[el.data.from], tp = layout.posMap[el.data.to];
          if (fp && tp) {
            el.data.fromPos = fp; el.data.toPos = tp;
            el.path.attr('d', curvedPath(fp, tp));
            if (el.labelEl) {
              const mp = midpoint(fp, tp);
              el.labelEl.attr('x', mp.x).attr('y', mp.y - 4);
            }
          }
        });
      })
      .on('end', function() { d3.select(this).classed('dragging', false); })
    );
  });

  // Auto-fit
  setTimeout(() => {
    const bounds = g.node().getBBox();
    if (bounds.width === 0) return;
    const w = container.clientWidth, h = container.clientHeight;
    const scale = 0.9 / Math.max(bounds.width / w, bounds.height / h);
    const tx = w/2 - (bounds.x + bounds.width/2) * scale;
    const ty = h/2 - (bounds.y + bounds.height/2) * scale;
    const t = d3.zoomIdentity.translate(tx, ty).scale(Math.min(scale, 1.5));
    svg.transition().duration(500).call(zoomBehavior.transform, t);
  }, 50);
}

// =========================================================================
// Helpers
// =========================================================================
function midpoint(a, b) { return { x: (a.x+b.x)/2, y: (a.y+b.y)/2 }; }
function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function highlightEdges(nodeId) {
  d3.selectAll('.edge-path').each(function() {
    const e = d3.select(this).datum();
    const connected = e && (e.from === nodeId || e.to === nodeId);
    d3.select(this).classed('highlighted', connected).classed('dimmed', !connected);
  });
  d3.selectAll('.edge-label').each(function() {
    const e = d3.select(this).datum();
    const connected = e && (e.from === nodeId || e.to === nodeId);
    d3.select(this).classed('highlighted', connected);
  });
}
function clearHighlight() {
  d3.selectAll('.edge-path').classed('highlighted', false).classed('dimmed', false);
  d3.selectAll('.edge-label').classed('highlighted', false);
}

function showTooltip(event, node) {
  const t = document.getElementById('tooltip');
  t.innerHTML = `<div class="tt-name">${node.name}</div><div class="tt-desc">${node.description||''}</div>`;
  t.classList.add('visible'); moveTooltip(event);
}
function moveTooltip(event) {
  const t = document.getElementById('tooltip');
  const r = document.getElementById('graph-container').getBoundingClientRect();
  t.style.left = (event.clientX-r.left+14)+'px'; t.style.top = (event.clientY-r.top-10)+'px';
}
function hideTooltip() { document.getElementById('tooltip').classList.remove('visible'); }

// =========================================================================
// Detail panel
// =========================================================================
function showDetail(node, data, layout) {
  const panel = document.getElementById('detail-panel');
  const nm = layout.nodeMap;
  const out = data.edges.filter(e => e.from_id === node.id && e.type !== 'contains' && e.type !== 'constrains');
  const inc = data.edges.filter(e => e.to_id === node.id && e.type !== 'contains' && e.type !== 'constrains');

  let h = `<h2>${node.name}</h2><div class="node-type">${node.type} - Layer ${node.layer}</div>`;
  if (node.description) h += `<div class="section"><p>${node.description}</p></div>`;
  if (node.file_path || node.line_count || node.risk_level) {
    h += `<div class="section"><h3>Info</h3>`;
    if (node.file_path) h += `<p class="file-path">${node.file_path}</p>`;
    if (node.line_count) h += `<p>${node.line_count.toLocaleString()} lines</p>`;
    if (node.risk_level) h += `<p>Risk: <span class="risk-badge risk-${node.risk_level}">${node.risk_level}</span></p>`;
    h += `</div>`;
  }
  const props = typeof node.properties === 'string' ? JSON.parse(node.properties) : (node.properties || {});
  const pk = Object.keys(props).filter(k => !['affects','flow_rank','flow_col'].includes(k));
  if (pk.length) {
    h += `<div class="section"><h3>Properties</h3><ul>`;
    pk.forEach(k => { const v = props[k]; h += Array.isArray(v) ? `<li><strong>${k}:</strong><br>${v.map(x=>`<span class="tag">${x}</span>`).join(' ')}</li>` : `<li><strong>${k}:</strong> ${v}</li>`; });
    h += `</ul></div>`;
  }
  if (out.length) {
    h += `<div class="section"><h3>Depends On (${out.length})</h3><ul>`;
    out.forEach(e => { const t = nm[e.to_id]; if(t) h += `<li class="edge-item"><span class="arrow">&#8594;</span><span class="edge-type">${e.type}</span><span class="edge-target" onclick="clickDetail('${e.to_id}')">${t.name}</span></li>`; });
    h += `</ul></div>`;
  }
  if (inc.length) {
    h += `<div class="section"><h3>Used By (${inc.length})</h3><ul>`;
    inc.forEach(e => { const s = nm[e.from_id]; if(s) h += `<li class="edge-item"><span class="arrow">&#8592;</span><span class="edge-type">${e.type}</span><span class="edge-target" onclick="clickDetail('${e.from_id}')">${s.name}</span></li>`; });
    h += `</ul></div>`;
  }
  panel.innerHTML = h;
}

window.clickDetail = function(nodeId) {
  const node = graphData.nodes.find(n => n.id === nodeId);
  if (!node) return;
  const ce = graphData.edges.find(e => e.type === 'contains' && e.to_id === nodeId);
  if (ce && !expandedModules.has(ce.from_id)) { expandedModules.add(ce.from_id); render(); }
  selectedNode = nodeId;
  showDetail(node, graphData, calculateLayout(graphData));
};

// Toolbar
document.getElementById('btn-expand-all').onclick = () => { graphData.nodes.filter(n => n.type === 'module').forEach(m => expandedModules.add(m.id)); render(); };
document.getElementById('btn-collapse-all').onclick = () => { expandedModules.clear(); render(); };

// Start
init();
</script>
</body>
