logging:
  level: INFO
  handlers:
    jsonl: INFO
    logs_db: DEBUG
    errors_db: ERROR
  retention:
    logs_db_days: 7
    errors_db_days: 30
    jsonl_max_bytes: 52428800
    jsonl_backup_count: 5
llm:
  backend_type: openai
  base_url: https://proxy.fuelix.ai/v1
  model: claude-sonnet-4-5-20250929
  context_window: 200000
  temperature: 0.3
  max_tokens: 16384
  top_p: 0.95
  thinking_budget: 10000
  subagents:
    code-reviewer:
      model: claude-sonnet-4-5-20250929
    test-writer:
      model: claude-sonnet-4-5-20250929
    doc-writer:
      model: claude-sonnet-4-5-20250929
    code-writer:
      model: claude-sonnet-4-5-20250929
    explore:
      model: claude-sonnet-4-5-20250929
    planner:
      model: claude-sonnet-4-5-20250929
    general-purpose:
      model: claude-sonnet-4-5-20250929
  api_key: sk-test-123
