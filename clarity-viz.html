<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClarAIty - AI Coding Agent Architecture</title>
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            overflow: hidden;
        }

        #header {
            background: #161b22;
            border-bottom: 1px solid #30363d;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #header h1 {
            font-size: 24px;
            font-weight: 600;
            color: #58a6ff;
        }

        #stats {
            display: flex;
            gap: 24px;
            font-size: 14px;
        }

        .stat {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 700;
            color: #58a6ff;
        }

        .stat-label {
            font-size: 11px;
            color: #8b949e;
            text-transform: uppercase;
        }

        #container {
            display: flex;
            height: calc(100vh - 73px);
        }

        #sidebar {
            width: 300px;
            background: #161b22;
            border-right: 1px solid #30363d;
            overflow-y: auto;
            padding: 16px;
        }

        #network {
            flex: 1;
            background: #0d1117;
        }

        #details-panel {
            width: 400px;
            background: #161b22;
            border-left: 1px solid #30363d;
            overflow-y: auto;
            padding: 20px;
            display: none;
        }

        #details-panel.active {
            display: block;
        }

        .search-box {
            width: 100%;
            padding: 8px 12px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #c9d1d9;
            font-size: 14px;
            margin-bottom: 16px;
        }

        .search-box:focus {
            outline: none;
            border-color: #58a6ff;
        }

        .section-title {
            font-size: 12px;
            font-weight: 600;
            color: #8b949e;
            text-transform: uppercase;
            margin-bottom: 12px;
            margin-top: 16px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 0;
            font-size: 13px;
        }

        .legend-color {
            width: 16px;
            height: 16px;
            border-radius: 3px;
            border: 1px solid #30363d;
        }

        .legend-count {
            margin-left: auto;
            color: #8b949e;
            font-size: 12px;
        }

        .detail-header {
            font-size: 18px;
            font-weight: 600;
            color: #58a6ff;
            margin-bottom: 8px;
        }

        .detail-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            margin-right: 6px;
            margin-bottom: 12px;
        }

        .badge-layer {
            background: #1f6feb;
            color: white;
        }

        .badge-type {
            background: #238636;
            color: white;
        }

        .badge-status {
            background: #9e6a03;
            color: white;
        }

        .detail-section {
            margin-top: 20px;
        }

        .detail-label {
            font-size: 12px;
            font-weight: 600;
            color: #8b949e;
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .detail-value {
            font-size: 14px;
            line-height: 1.6;
            color: #c9d1d9;
        }

        .artifact-item {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 8px 12px;
            margin-bottom: 8px;
            font-size: 13px;
        }

        .artifact-name {
            font-weight: 600;
            color: #58a6ff;
            font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace;
        }

        .artifact-type {
            color: #8b949e;
            font-size: 11px;
            text-transform: uppercase;
        }

        .close-button {
            float: right;
            background: none;
            border: none;
            color: #8b949e;
            font-size: 24px;
            cursor: pointer;
            padding: 0;
            width: 32px;
            height: 32px;
            line-height: 32px;
            text-align: center;
            border-radius: 6px;
        }

        .close-button:hover {
            background: #30363d;
            color: #c9d1d9;
        }

        .filter-group {
            margin-bottom: 12px;
        }

        .filter-button {
            width: 100%;
            padding: 8px 12px;
            background: #21262d;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #c9d1d9;
            font-size: 13px;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s;
        }

        .filter-button:hover {
            background: #30363d;
            border-color: #58a6ff;
        }

        .filter-button.active {
            background: #1f6feb;
            border-color: #1f6feb;
            color: white;
        }
    </style>
</head>
<body>
    <div id="header">
        <h1>🧠 ClarAIty - AI Coding Agent Architecture</h1>
        <div id="stats">
            <div class="stat">
                <div class="stat-value" id="stat-components">0</div>
                <div class="stat-label">Components</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="stat-relationships">0</div>
                <div class="stat-label">Relationships</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="stat-artifacts">0</div>
                <div class="stat-label">Artifacts</div>
            </div>
        </div>
    </div>

    <div id="container">
        <div id="sidebar">
            <input type="text" class="search-box" id="search" placeholder="Search components...">

            <div class="section-title">Filter by Layer</div>
            <div id="layer-filters" class="filter-group"></div>

            <div class="section-title">Legend</div>
            <div id="legend"></div>
        </div>

        <div id="network"></div>

        <div id="details-panel">
            <button class="close-button" onclick="closeDetails()">×</button>
            <div id="details-content"></div>
        </div>
    </div>

    <script>
        // Layer color mapping
        const layerColors = {
            'core': '#ff6b6b',
            'memory': '#4ecdc4',
            'rag': '#45b7d1',
            'workflow': '#96ceb4',
            'tools': '#feca57',
            'llm': '#ff9ff3',
            'prompts': '#a29bfe',
            'hooks': '#fd79a8',
            'subagents': '#74b9ff',
            'other': '#636e72'
        };

        let clarityData = {};
        let network = null;
        let allNodes = [];
        let allEdges = [];
        let activeFilters = new Set();

        // Load data
        async function loadData() {
            const response = await fetch('clarity-data.json');
            clarityData = await response.json();

            // Update stats
            document.getElementById('stat-components').textContent = clarityData.stats.total_components;
            document.getElementById('stat-relationships').textContent = clarityData.stats.total_relationships;
            document.getElementById('stat-artifacts').textContent = clarityData.stats.total_artifacts;

            // Initialize visualization
            initializeVisualization();
            createLegend();
            createLayerFilters();
        }

        function initializeVisualization() {
            // Create nodes
            allNodes = clarityData.components.map(comp => {
                const layer = comp.layer || 'other';
                return {
                    id: comp.id,
                    label: comp.name,
                    title: comp.purpose || comp.name,
                    color: {
                        background: layerColors[layer] || layerColors['other'],
                        border: '#fff',
                        highlight: {
                            background: layerColors[layer] || layerColors['other'],
                            border: '#fff'
                        }
                    },
                    font: { color: '#fff', size: 14, face: 'arial', bold: { color: '#fff' } },
                    shape: comp.type === 'orchestrator' ? 'box' : 'dot',
                    size: comp.type === 'orchestrator' ? 30 : 20,
                    layer: layer,
                    data: comp
                };
            });

            // Create edges
            allEdges = clarityData.relationships.map(rel => ({
                from: rel.source_id,
                to: rel.target_id,
                title: rel.description || rel.type,
                arrows: 'to',
                color: { color: '#30363d', highlight: '#58a6ff' },
                width: rel.criticality === 'high' ? 3 : (rel.criticality === 'medium' ? 2 : 1),
                smooth: { type: 'cubicBezier', roundness: 0.5 }
            }));

            // Create network
            const container = document.getElementById('network');
            const data = {
                nodes: new vis.DataSet(allNodes),
                edges: new vis.DataSet(allEdges)
            };

            const options = {
                physics: {
                    enabled: true,
                    barnesHut: {
                        gravitationalConstant: -8000,
                        centralGravity: 0.3,
                        springLength: 150,
                        springConstant: 0.04,
                        damping: 0.09
                    },
                    stabilization: {
                        enabled: true,
                        iterations: 200
                    }
                },
                interaction: {
                    hover: true,
                    tooltipDelay: 100,
                    navigationButtons: true,
                    keyboard: true
                },
                layout: {
                    improvedLayout: true,
                    hierarchical: false
                }
            };

            network = new vis.Network(container, data, options);

            // Event handlers
            network.on('click', function(params) {
                if (params.nodes.length > 0) {
                    const nodeId = params.nodes[0];
                    showComponentDetails(nodeId);
                } else {
                    closeDetails();
                }
            });
        }

        function createLegend() {
            const legend = document.getElementById('legend');
            const stats = clarityData.stats.components_by_layer;

            Object.entries(layerColors).forEach(([layer, color]) => {
                const count = stats[layer] || 0;
                if (count > 0) {
                    const item = document.createElement('div');
                    item.className = 'legend-item';
                    item.innerHTML = `
                        <div class="legend-color" style="background: ${color}"></div>
                        <span>${layer}</span>
                        <span class="legend-count">${count}</span>
                    `;
                    legend.appendChild(item);
                }
            });
        }

        function createLayerFilters() {
            const container = document.getElementById('layer-filters');
            const stats = clarityData.stats.components_by_layer;

            // Add "All" button
            const allButton = document.createElement('button');
            allButton.className = 'filter-button active';
            allButton.textContent = `All Layers (${clarityData.stats.total_components})`;
            allButton.onclick = () => clearFilters();
            container.appendChild(allButton);

            // Add layer buttons
            Object.entries(stats).sort().forEach(([layer, count]) => {
                const button = document.createElement('button');
                button.className = 'filter-button';
                button.innerHTML = `
                    <div style="display: flex; align-items: center; gap: 8px">
                        <div class="legend-color" style="background: ${layerColors[layer]}"></div>
                        <span>${layer}</span>
                        <span style="margin-left: auto; color: #8b949e">${count}</span>
                    </div>
                `;
                button.onclick = () => filterByLayer(layer);
                container.appendChild(button);
            });
        }

        function filterByLayer(layer) {
            // Update button states
            document.querySelectorAll('#layer-filters .filter-button').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.closest('.filter-button').classList.add('active');

            // Filter nodes
            const visibleNodeIds = allNodes
                .filter(node => node.layer === layer)
                .map(node => node.id);

            // Filter edges to only show connections between visible nodes
            const visibleEdges = allEdges.filter(edge =>
                visibleNodeIds.includes(edge.from) && visibleNodeIds.includes(edge.to)
            );

            // Update network
            network.setData({
                nodes: new vis.DataSet(allNodes.filter(n => visibleNodeIds.includes(n.id))),
                edges: new vis.DataSet(visibleEdges)
            });

            network.fit();
        }

        function clearFilters() {
            // Update button states
            document.querySelectorAll('#layer-filters .filter-button').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelector('#layer-filters .filter-button').classList.add('active');

            // Show all nodes and edges
            network.setData({
                nodes: new vis.DataSet(allNodes),
                edges: new vis.DataSet(allEdges)
            });

            network.fit();
        }

        function showComponentDetails(nodeId) {
            const component = clarityData.components.find(c => c.id === nodeId);
            if (!component) return;

            const artifacts = clarityData.artifacts.filter(a => a.component_id === nodeId);
            const decisions = clarityData.design_decisions.filter(d => d.component_id === nodeId);

            let html = `
                <div class="detail-header">${component.name}</div>
                <span class="detail-badge badge-layer">${component.layer}</span>
                <span class="detail-badge badge-type">${component.type}</span>
                <span class="detail-badge badge-status">${component.status}</span>
            `;

            if (component.purpose) {
                html += `
                    <div class="detail-section">
                        <div class="detail-label">Purpose</div>
                        <div class="detail-value">${component.purpose}</div>
                    </div>
                `;
            }

            if (component.business_value) {
                html += `
                    <div class="detail-section">
                        <div class="detail-label">Business Value</div>
                        <div class="detail-value">${component.business_value}</div>
                    </div>
                `;
            }

            if (component.design_rationale) {
                html += `
                    <div class="detail-section">
                        <div class="detail-label">Design Rationale</div>
                        <div class="detail-value">${component.design_rationale}</div>
                    </div>
                `;
            }

            if (component.responsibilities) {
                try {
                    const resp = JSON.parse(component.responsibilities);
                    if (Array.isArray(resp) && resp.length > 0) {
                        html += `
                            <div class="detail-section">
                                <div class="detail-label">Responsibilities</div>
                                <div class="detail-value">
                                    <ul style="margin-left: 20px; margin-top: 6px">
                                        ${resp.map(r => `<li>${r}</li>`).join('')}
                                    </ul>
                                </div>
                            </div>
                        `;
                    }
                } catch (e) {
                    // Invalid JSON, skip
                }
            }

            if (artifacts.length > 0) {
                html += `
                    <div class="detail-section">
                        <div class="detail-label">Code Artifacts (${artifacts.length})</div>
                `;
                artifacts.slice(0, 10).forEach(artifact => {
                    html += `
                        <div class="artifact-item">
                            <div class="artifact-name">${artifact.name}</div>
                            <div class="artifact-type">${artifact.type} • ${artifact.file_path}</div>
                        </div>
                    `;
                });
                if (artifacts.length > 10) {
                    html += `<div style="color: #8b949e; font-size: 12px; margin-top: 8px">...and ${artifacts.length - 10} more</div>`;
                }
                html += `</div>`;
            }

            document.getElementById('details-content').innerHTML = html;
            document.getElementById('details-panel').classList.add('active');
        }

        function closeDetails() {
            document.getElementById('details-panel').classList.remove('active');
        }

        // Search functionality
        document.getElementById('search').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            if (!query) {
                clearFilters();
                return;
            }

            const matchingNodes = allNodes.filter(node =>
                node.label.toLowerCase().includes(query) ||
                (node.data.purpose && node.data.purpose.toLowerCase().includes(query))
            );

            const matchingNodeIds = matchingNodes.map(n => n.id);

            // Highlight matching nodes
            network.setData({
                nodes: new vis.DataSet(allNodes.map(node => ({
                    ...node,
                    opacity: matchingNodeIds.includes(node.id) ? 1 : 0.2
                }))),
                edges: new vis.DataSet(allEdges)
            });

            if (matchingNodes.length > 0) {
                network.focus(matchingNodes[0].id, {
                    scale: 1.5,
                    animation: true
                });
            }
        });

        // Initialize on load
        loadData();
    </script>
</body>
</html>
